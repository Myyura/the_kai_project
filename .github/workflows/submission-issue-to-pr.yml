name: Convert submission issue to PR

on:
  issues:
    types:
      - labeled

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  convert:
    name: Create draft PR from web submission
    if: github.event.label.name == 'submission:ready-for-pr'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ secrets.CONTENT_BOT_TOKEN || github.token }}
      CLA_ATTESTATION_SECRET: ${{ secrets.CLA_ATTESTATION_SECRET }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      BRANCH_NAME: codex/submission-${{ github.event.issue.number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CONTENT_BOT_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Convert issue payload
        id: convert
        run: |
          set -euo pipefail
          git checkout -B "$BRANCH_NAME"
          node scripts/convert-submission-issue.js \
            --event "$GITHUB_EVENT_PATH" \
            --result .submission-result.json \
            --pr-body .submission-pr-body.md
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('fs');
          const result = JSON.parse(fs.readFileSync('.submission-result.json', 'utf8'));
          console.log(`file_path=${result.filePath}`);
          console.log(`pr_title=${result.prTitle}`);
          console.log(`branch_name=${result.branchName}`);
          console.log(`submission_id=${result.submissionId}`);
          console.log(`conflict=${result.conflict ? 'true' : 'false'}`);
          console.log(`conflict_kind=${result.conflictKind || ''}`);
          NODE

      - name: Mark submission conflict
        if: steps.convert.outputs.conflict == 'true'
        run: |
          if [ "${{ steps.convert.outputs.conflict_kind }}" = "target_exists" ]; then
            message="无法自动生成 PR：目标文件路径已经存在。请调整题解的文件标识，或确认是否应该改为纠错投稿。"
          else
            message="无法自动生成 PR：题解原文已经发生变化，签名 diff 的基准版本与当前仓库不一致。请基于最新原文重新提交纠错。"
          fi
          gh issue comment "$ISSUE_NUMBER" --body "$message"
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "submission:conflict" \
            --remove-label "submission:ready-for-pr"

      - name: Validate generated document
        if: steps.convert.outputs.conflict != 'true'
        run: |
          yarn review:format --files "${{ steps.convert.outputs.file_path }}"
          yarn api:validate

      - name: Commit generated document
        if: steps.convert.outputs.conflict != 'true'
        run: |
          set -euo pipefail
          git config user.name "${{ github.event.sender.login }}"
          git config user.email "${{ github.event.sender.id }}+${{ github.event.sender.login }}@users.noreply.github.com"
          git add "${{ steps.convert.outputs.file_path }}"
          git commit -m "${{ steps.convert.outputs.pr_title }}"
          git push --force-with-lease origin "$BRANCH_NAME"

      - name: Open draft PR
        id: pr
        if: steps.convert.outputs.conflict != 'true'
        run: |
          set -euo pipefail
          pr_url="$(gh pr list \
            --state open \
            --base main \
            --head "$BRANCH_NAME" \
            --json url \
            --jq '.[0].url // empty')"
          if [ -z "$pr_url" ]; then
            pr_url="$(gh pr create \
              --draft \
              --base main \
              --head "$BRANCH_NAME" \
              --title "${{ steps.convert.outputs.pr_title }}" \
              --body-file .submission-pr-body.md)"
          else
            echo "Reusing existing pull request: $pr_url"
          fi
          pr_number="$(gh pr view "$pr_url" --json number --jq '.number')"
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Mark issue converted
        if: steps.convert.outputs.conflict != 'true'
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "已从该投稿创建 draft PR：${{ steps.pr.outputs.url }}"
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "submission:converted" \
            --remove-label "submission:ready-for-pr"

      - name: Notify submission backend
        if: steps.convert.outputs.conflict != 'true'
        run: |
          set -euo pipefail
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$CONTENT_SUBMISSION_CALLBACK_SECRET" ]; then
            echo "Submission callback secrets are not configured; skipping backend writeback."
            exit 0
          fi

          node <<'NODE'
          (async () => {
            const endpoint = `${process.env.SUPABASE_URL.replace(/\/$/, '')}/functions/v1/content-submissions/conversion`;
            const body = {
              submissionId: process.env.SUBMISSION_ID,
              issueNumber: Number(process.env.ISSUE_NUMBER),
              prNumber: Number(process.env.PR_NUMBER),
              prUrl: process.env.PR_URL,
            };

            const response = await fetch(endpoint, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${process.env.SUPABASE_ANON_KEY}`,
                apikey: process.env.SUPABASE_ANON_KEY,
                'X-Kai-Submission-Callback-Secret': process.env.CONTENT_SUBMISSION_CALLBACK_SECRET,
              },
              body: JSON.stringify(body),
            });

            if (!response.ok) {
              const text = await response.text();
              throw new Error(`Submission callback failed: ${response.status} ${text}`);
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CONTENT_SUBMISSION_CALLBACK_SECRET: ${{ secrets.CONTENT_SUBMISSION_CALLBACK_SECRET }}
          SUBMISSION_ID: ${{ steps.convert.outputs.submission_id }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.url }}

      - name: Report conversion failure
        if: failure()
        run: |
          if [ -n "${{ steps.pr.outputs.url }}" ]; then
            message="PR 已成功创建，但投稿后端状态回写失败。请查看本次 GitHub Actions 日志。"
          else
            message="自动转换 PR 失败。请查看本次 GitHub Actions 日志。"
          fi
          gh issue comment "$ISSUE_NUMBER" --body "$message"
