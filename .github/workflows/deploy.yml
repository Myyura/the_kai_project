name: 部署到 GitHub Pages

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
    # 如果你想要进一步定义触发、路径以及其他内容，请检阅 Github Actions 文档
    # https://docs.github.com/zh/actions/using-workflows/workflow-syntax-for-github-actions#on

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: 构建 Docusaurus
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: 安装依赖
        run: yarn install --frozen-lockfile
      - name: 校验 API 数据
        run: yarn api:validate
      - name: 构建网站
        run: yarn build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          HCAPTCHA_SITE_KEY: ${{ secrets.HCAPTCHA_SITE_KEY }}
          PROBLEM_SETS_ENABLED: 'true'
          GITHUB_TOKEN: ${{ github.token }}
      - name: 检查 Pages 构建入口
        run: |
          test -f build/index.html
          test ! -d build/ja
          test ! -d build/en
          test ! -f build/progress.html
      - name: 部署 Supabase Edge Functions
        if: github.event_name == 'push'
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Supabase deploy secrets are not configured; skipping Edge Function deploy."
            exit 0
          fi
          npx supabase@latest functions deploy developer-api-keys --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase@latest functions deploy kai-api --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase@latest functions deploy content-submissions --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase@latest functions deploy agent-session --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase@latest functions deploy agent-context --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: 同步 API 数据到 Supabase
        if: github.event_name == 'push'
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Supabase sync secrets are not configured; skipping API data sync."
            exit 0
          fi
          yarn api:sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 上传构建制品
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: 部署到 GitHub Pages
    needs: build
    if: github.event_name == 'push'

    # 给予 GITHUB_TOKEN 进行 Pages 部署所必须的权限
    permissions:
      pages: write # 以部署到 Pages
      id-token: write # 以验证部署来自恰当的源

    # 部署到 Github Pages 环境
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
