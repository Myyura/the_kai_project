name: 部署到 GitHub Pages

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
    # 如果你想要进一步定义触发、路径以及其他内容，请检阅 Github Actions 文档
    # https://docs.github.com/zh/actions/using-workflows/workflow-syntax-for-github-actions#on

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: 构建 Docusaurus
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - name: 安装依赖
        run: yarn install --frozen-lockfile
      - name: 校验 API 数据
        run: yarn api:validate
      - name: 运行自动化测试
        run: yarn test
      - name: 配置构建交换空间
        shell: bash
        run: |
          set -euo pipefail

          target_swap_bytes=$((8 * 1024 * 1024 * 1024))
          existing_swap_bytes=$(sudo swapon --show=SIZE --bytes --noheadings \
            | awk '{total += $1} END {print total + 0}')

          if [ "$existing_swap_bytes" -ge "$target_swap_bytes" ]; then
            echo "Existing swap is already at least 8 GiB; reusing it."
          else
            extra_swap_bytes=$((target_swap_bytes - existing_swap_bytes))
            extra_swap_file=/kai-build.swap

            echo "Existing swap: $existing_swap_bytes bytes"
            echo "Adding swap: $extra_swap_bytes bytes at $extra_swap_file"
            sudo fallocate -l "$extra_swap_bytes" "$extra_swap_file"
            sudo chmod 600 "$extra_swap_file"
            sudo mkswap "$extra_swap_file"
            sudo swapon "$extra_swap_file"
          fi

          sudo swapon --show
          free -h
      - name: 构建网站
        run: /usr/bin/time -v yarn build
        env:
          DOCUSAURUS_PERF_LOGGER: 'true'
          # Build the server and client bundles sequentially, then keep SSG
          # concurrency bounded. This trades build time for a lower peak RSS.
          DOCUSAURUS_SEQUENTIAL_BUNDLES: 'true'
          DOCUSAURUS_NO_PERSISTENT_CACHE: 'true'
          DISABLE_RSPACK_INCREMENTAL: 'true'
          DOCUSAURUS_SSG_WORKER_THREAD_COUNT: '2'
          DOCUSAURUS_SSG_WORKER_THREAD_RECYCLER_MAX_MEMORY: '300000000'
          RAYON_NUM_THREADS: '1'
          RSPACK_BLOCKING_THREADS: '1'
          NODE_OPTIONS: '--max-old-space-size=4096'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          HCAPTCHA_SITE_KEY: ${{ secrets.HCAPTCHA_SITE_KEY }}
          PROBLEM_SETS_ENABLED: 'true'
          GITHUB_TOKEN: ${{ github.token }}
      - name: 检查 Pages 构建入口
        run: |
          test -f build/index.html
          test -f build/content-export/v1/kai-content-v1.json.gz
          test ! -d build/ja
          test ! -d build/en
          test ! -f build/progress.html
      - name: 上传构建制品
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: 部署到 GitHub Pages
    needs: build
    if: github.event_name == 'push'

    # 给予 GITHUB_TOKEN 进行 Pages 部署所必须的权限
    permissions:
      pages: write # 以部署到 Pages
      id-token: write # 以验证部署来自恰当的源

    # 部署到 Github Pages 环境
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  backend:
    name: 迁移 Supabase 并部署 Edge Functions
    needs: deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1
        with:
          version: 2.109.1
      - name: 迁移数据库并部署函数
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF are required for a production deployment."
            exit 1
          fi
          if compgen -G 'supabase/migrations/*.sql' > /dev/null; then
            if [ -z "$SUPABASE_DB_PASSWORD" ]; then
              echo "::error::SUPABASE_DB_PASSWORD is required when pending database migrations exist."
              exit 1
            fi
            supabase link --project-ref "$SUPABASE_PROJECT_REF"
            supabase db push --linked --include-all --dry-run
            supabase db push --linked --include-all
          else
            echo "No pending database migrations; using the consolidated production baseline."
          fi
          supabase functions deploy developer-api-keys --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy kai-api --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy content-submissions --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy agent-session --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy agent-context --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # `yarn catalog:sync` is intentionally run by a maintainer from a trusted
      # workstation after deployment. It syncs identities and discovery
      # metadata only; Markdown bodies ship with the Pages artifact.
